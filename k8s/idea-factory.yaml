apiVersion: apps/v1
kind: Deployment
metadata:
  name: idea-factory
  namespace: default
  labels:
    app: idea-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: idea-factory
  template:
    metadata:
      labels:
        app: idea-factory
    spec:
      containers:
        - name: idea-factory
          image: ghcr.io/willeastbury/idea-factory:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: idea-factory-secrets
            - configMapRef:
                name: idea-factory-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: idea-factory
  namespace: default
spec:
  selector:
    app: idea-factory
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Secret
metadata:
  name: idea-factory-secrets
  namespace: default
type: Opaque
stringData:
  GITHUB_TOKEN: "REPLACE_ME"
  IDEA_FACTORY_USERNAME: "REPLACE_ME"
  IDEA_FACTORY_PASSWORD: "REPLACE_ME"
  IDEA_FACTORY_SECRET_KEY: "REPLACE_ME"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: idea-factory-config
  namespace: default
data:
  SWARM_REPO: "owner/repo"

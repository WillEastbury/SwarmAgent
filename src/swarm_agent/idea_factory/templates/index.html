<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Idea Factory</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
               background: #0d1117; color: #c9d1d9; min-height: 100vh;
               display: flex; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 600px; padding: 2rem; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #f0f6fc; }
        form { display: flex; flex-direction: column; gap: 1rem; }
        input, textarea { background: #161b22; border: 1px solid #30363d;
                          border-radius: 6px; padding: 0.75rem; color: #c9d1d9;
                          font-size: 1rem; font-family: inherit; }
        input:focus, textarea:focus { outline: none; border-color: #58a6ff; }
        textarea { resize: vertical; min-height: 120px; }
        button { background: #238636; color: #fff; border: none; border-radius: 6px;
                 padding: 0.75rem 1.5rem; font-size: 1rem; cursor: pointer;
                 font-weight: 600; }
        button:hover { background: #2ea043; }
        .flash { padding: 0.75rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; }
        .flash.success { background: #1a3a2a; border: 1px solid #238636; color: #3fb950; }
        .flash.error { background: #3a1a1a; border: 1px solid #da3633; color: #f85149; }
        .flash a { color: #58a6ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💡 Idea Factory</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endwith %}
        <form method="post" action="/submit">
            <input type="text" name="title" placeholder="Idea title" required autofocus>
            <textarea name="body" placeholder="Describe your idea (optional)"></textarea>
            <button type="submit">Submit Idea</button>
        </form>
    </div>
</body>
</html>
